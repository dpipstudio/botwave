  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.42.1/css/jquery.terminal.min.css" />
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
    }

    .terminal {
      height: 100vh;
    }

<body>
  <div id="term"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.42.1/js/jquery.terminal.min.js"></script>
  <script>
    (function () {
      // tag -> hex color, mirrored from bwsc client.js
      const TAG_COLORS = {
        OK: '#92ff92',
        ERR: '#ff6b6b',
        WARN: '#f5c542',
        INFO: '#4dc3ff',
        CLIENT: '#cc88ff',
        SERVER: '#00d7d7',
        FILE: '#f5c542',
        BCAST: '#ff88ff',
        VER: '#4dc3ff',
        UPD: '#f5c542',
        HNDL: '#cc88ff',
        SSTV: '#6699ff',
        AUTH: '#6699cc',
        TLS: '#ff6b6b',
        MORSE: '#cc88ff',
        ALSA: '#ff88ff',
        QUEUE: '#f5c542',
        CVRT: '#4dc3ff',
      };

      function colorize(text, hex) {
        return `[[;${hex};]${$.terminal.escape_brackets(text)}]`;
      }

      function formatLine(line) {
        // thanks claude

        // extract leading whitespace before any processing
        const indentMatch = line.match(/^(\s*)(.*)/);
        const spaces = indentMatch[1].length;
        const indent = '\u00a0'.repeat(spaces);
        line = indentMatch[2];

        // tagged messages: [OK] some text
        const tagMatch = line.match(/^\[([A-Z]+)\]\s(.*)$/);
        if (tagMatch) {
          const [, tag, content] = tagMatch;
          const hex = TAG_COLORS[tag];
          if (hex) {
            return indent + `${colorize(`[${tag}]`, hex)} ${$.terminal.escape_brackets(content)}`;
          }
        }

        // separator lines
        if (line.includes('─')) {
          return colorize(indent + line, '#4466aa');
        }

        // client info fields
        if (line.match(/^(Hostname|Address|Protocol|Connected|Last seen|Machine):/)) {
          return colorize(indent + line, '#00d7d7');
        }

        // ID lines
        if (line.match(/^ID:\s/)) {
          return colorize(indent + line, '#ffffff');
        }

        // anything with indent — wrap in a neutral color span to preserve spaces
        if (indent) {
          return colorize(indent + line, '#999999');
        }

        return $.terminal.escape_brackets(line);
      }

      let ws = null;
      let state = 'idle';
      let pendingPw = false;

      const term = $('#term').terminal(function (input) {

        if (pendingPw) {
          pendingPw = false;
          term.set_mask(false);
          ws.send(input);
          return;
        }

        if (state === 'connected' && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(input);
        }

      }, {
        greetings: 'BotWave Remote CLI\n',
        prompt: '$ ',
        history: true,
      });

      function connect(url) {
        try {
          ws = new WebSocket(url);
        } catch (e) {
          term.error('Invalid URL: ' + url);
          promptUrl();
          return;
        }

        ws.onopen = function () {
          state = 'awaiting_password';
        };

        ws.onmessage = function (ev) {
          const data = ev.data;
          const trimmed = data.trim();

          if (state === 'awaiting_password') {
            if (trimmed.startsWith('Password:')) {
              term.set_prompt('password: ');
              term.set_mask(true);
              pendingPw = true;
              return;
            }

            if (trimmed === 'Authentication failed.' || trimmed === 'Authentication timeout.') {
              term.error(trimmed);
              ws.close();
              return;
            }

            if (trimmed === 'OK.') {
              state = 'connected';
              term.set_prompt('botwave › ');
              return;
            }

            // welcome message after OK or no-password server
            if (trimmed) term.echo(formatLine(trimmed));

            state = 'connected';
            term.set_prompt('botwave › ');
            return;
          }

          // normal output, split on newlines, preserve indentation
          data.split('\n').forEach(function (line) {
            if (!line.trim()) return;
            if (/\[\d{1,3}(\.\d{1,3}){3}\]/.test(line)) return; // ignore client log echoes

            term.echo(formatLine(line), { formatters: false });
          });
        };

        ws.onerror = function () {
          term.error('Connection failed. If on botwave.dpip.lol, your server needs wss:// (via a reverse proxy). Otherwise save this page and open it locally.');
          state = 'idle';
          ws = null;
          term.set_prompt('$ ');
          promptUrl();
        };

        ws.onclose = function () {
          if (state !== 'idle') {
            term.echo('Disconnected :|');
            state = 'idle';
            ws = null;
            term.set_prompt('$ ');
            promptUrl();
          }
        };
      }

      function promptUrl() {
        term.read('Remote CLI URL (e.g. ws://192.168.1.1:9939): ').then(function (url) {
          url = url.trim();
          if (!url) { promptUrl(); return; }
          connect(url);
        });
      }

      promptUrl();
    })();
  </script>
</body>
