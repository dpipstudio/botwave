name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please be as detailed as possible and search for similar issues before opening a new one.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: I was doing X and Y happened...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. See error
  - type: input
    id: os
    attributes:
      label: OS
      description: e.g. Debian, Ubuntu
      placeholder: Debian 12
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. v1.0.0-oak
      placeholder: v1.0.0-oak
  - type: input
    id: machine
    attributes:
      label: Machine (Hardware)
      description: The hardware on which you encountered this issue, if applicable
      placeholder: Raspberry Pi 4
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.